<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Combiner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      color: #1a1a2e;
    }

    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p.subtitle { color: #555; margin-bottom: 2rem; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 640px;
    }

    .drop-zone {
      border: 2px dashed #a0a8b8;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #4f8ef7;
      background: #f0f6ff;
    }
    .drop-zone svg { width: 48px; height: 48px; color: #4f8ef7; margin-bottom: .75rem; }
    .drop-zone p { color: #555; }
    .drop-zone span { color: #4f8ef7; font-weight: 600; }

    #file-input { display: none; }

    #preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: .75rem;
      margin-top: 1.25rem;
    }
    .thumb-wrap {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 1;
      background: #eee;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .thumb-wrap button {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,.55); color: #fff;
      border: none; border-radius: 50%;
      width: 22px; height: 22px;
      font-size: .75rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    label.layout-label { font-size: .9rem; font-weight: 600; }
    select#layout {
      padding: .4rem .75rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: .9rem;
    }

    button#combine-btn {
      margin-left: auto;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .65rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button#combine-btn:hover { background: #2f6fd6; }
    button#combine-btn:disabled { background: #aac4f7; cursor: not-allowed; }

    #status {
      margin-top: 1rem;
      font-size: .9rem;
      color: #e05;
      min-height: 1.2em;
    }

    /* ─── Top progress bar ───────────────────────────────────────────── */
    #top-progress {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 3px;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s;
    }
    #top-progress.active { opacity: 1; }
    #top-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4f8ef7 0%, #a78bfa 50%, #4f8ef7 100%);
      background-size: 200% 100%;
      border-radius: 0 2px 2px 0;
      transition: width .4s ease;
    }
    #top-progress.active #top-progress-fill {
      animation: progress-shimmer 1.8s linear infinite;
    }
    @keyframes progress-shimmer {
      0%   { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    /* ─── Processing state card ──────────────────────────────────────── */
    #processing-state {
      display: none;
      align-items: center;
      gap: .75rem;
      margin-top: 1rem;
      padding: .75rem 1rem;
      background: #f4f7ff;
      border: 1px solid #dce6ff;
      border-radius: 8px;
      font-size: .9rem;
      color: #3a4a6b;
    }
    #processing-state.visible { display: flex; }

    .spinner {
      flex-shrink: 0;
      width: 18px; height: 18px;
      border: 2.5px solid #c7d7f9;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .processing-label { flex: 1; }

    .eta-badge {
      font-size: .8rem;
      font-weight: 600;
      color: #4f8ef7;
      background: #dce9ff;
      padding: .15rem .65rem;
      border-radius: 999px;
      min-width: 3.5rem;
      text-align: center;
      letter-spacing: .02em;
      transition: background .3s;
    }
    .eta-badge.done {
      color: #2ecc71;
      background: #d4f7e6;
    }

    #result-section { margin-top: 2rem; width: 100%; max-width: 640px; display: none; }
    #result-section h2 { margin-bottom: .75rem; }
    #result-img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }
    #download-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      margin-top: 1rem;
      background: #2ecc71;
      color: #fff;
      padding: .6rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    #download-btn:hover { background: #27ae60; }
  </style>
</head>
<body>

<div id="top-progress"><div id="top-progress-fill"></div></div>

<h1>🖼️ Image Combiner</h1>
<p class="subtitle">Upload multiple images and merge them into one</p>

<div class="card">
  <div class="drop-zone" id="drop-zone">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <p><span>Click to select</span> or drag &amp; drop images here</p>
    <p style="font-size:.8rem;margin-top:.5rem;color:#888">PNG, JPG, WEBP, HEIC/HEIF — up to 10 MB each</p>
  </div>

  <input type="file" id="file-input" accept="image/*" multiple />

  <div id="preview-grid"></div>

  <div class="controls">
    <label class="layout-label" for="layout">Layout:</label>
    <select id="layout">
      <option value="horizontal">Horizontal (side by side)</option>
      <option value="vertical">Vertical (stacked)</option>
    </select>
    <button id="combine-btn" disabled>Combine Images</button>
  </div>

  <div id="status"></div>

  <div id="processing-state">
    <span class="spinner"></span>
    <span class="processing-label" id="processing-label">Processing images…</span>
    <span class="eta-badge" id="eta-badge"></span>
  </div>
</div>

<div id="result-section">
  <h2>Combined Result</h2>
  <img id="result-img" alt="Combined image" />
  <br />
  <a id="download-btn" download="combined.png">⬇ Download combined.png</a>
</div>

<script>
  // ─── Element references ───────────────────────────────────────────────────
  const dropZone      = document.getElementById('drop-zone');
  const fileInput     = document.getElementById('file-input');
  const previewGrid   = document.getElementById('preview-grid');
  const combineBtn    = document.getElementById('combine-btn');
  const statusEl      = document.getElementById('status');
  const resultSection = document.getElementById('result-section');
  const resultImg     = document.getElementById('result-img');
  const downloadBtn   = document.getElementById('download-btn');

  const topProgress     = document.getElementById('top-progress');
  const topProgressFill = document.getElementById('top-progress-fill');
  const processingState = document.getElementById('processing-state');
  const processingLabel = document.getElementById('processing-label');
  const etaBadge        = document.getElementById('eta-badge');

  /**
   * Holds the File objects chosen by the user.
   * Slots may be `null` when the user removes an image (avoids re-indexing).
   * @type {(File|null)[]}
   */
  let files = [];

  /**
   * The blob URL currently shown in the result section.
   * Tracked so it can be revoked before creating a new one, preventing
   * memory leaks in long-lived sessions.
   * @type {string|null}
   */
  let currentResultUrl = null;

  // ─── Drop-zone interactions ───────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    // Reset the input so the same file can be re-added after removal.
    fileInput.value = '';
  });

  // ─── File management ──────────────────────────────────────────────────────

  /**
   * Filters new files to images only, adds them to the `files` array,
   * renders thumbnail previews, and refreshes the Combine button state.
   *
   * @param {File[]} newFiles - Raw File objects from an input or drop event.
   */
  function addFiles(newFiles) {
    const images = newFiles.filter(f => f.type.startsWith('image/'));
    images.forEach(f => {
      files.push(f);
      renderThumb(f, files.length - 1);
    });
    updateBtn();
  }

  /**
   * Creates a thumbnail card for a single image file and appends it to the
   * preview grid.  Each card holds an object URL that is valid for the
   * lifetime of the page.
   *
   * @param {File}   file  - The image file to preview.
   * @param {number} index - The file's index in the `files` array, stored as
   *                         a data attribute so the remove handler can find it.
   */
  function renderThumb(file, index) {
    const url  = URL.createObjectURL(file);
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    wrap.dataset.index = index;
    wrap.innerHTML = `<img src="${url}" alt="preview" /><button title="Remove">✕</button>`;
    wrap.querySelector('button').addEventListener('click', () => removeFile(wrap));
    previewGrid.appendChild(wrap);
  }

  /**
   * Nullifies the file at the given index and removes the thumbnail element.
   * Using `null` instead of `.splice()` preserves the indices stored on other
   * thumbnail cards.
   *
   * @param {HTMLElement} wrap - The `.thumb-wrap` element to remove.
   */
  function removeFile(wrap) {
    const idx = parseInt(wrap.dataset.index, 10);
    files[idx] = null;
    wrap.remove();
    updateBtn();
  }

  /**
   * Enables or disables the Combine button based on the number of selected
   * (non-null) files, and clears any previous status message.
   */
  function updateBtn() {
    const count = files.filter(Boolean).length;
    combineBtn.disabled = count < 2;
    statusEl.textContent = '';
  }

  // ─── Processing UI ────────────────────────────────────────────────────────

  /**
   * Estimates processing time in seconds based on image count and total size.
   * Clamps to 3–20 seconds to stay informative without being misleading.
   *
   * @param {File[]} imageFiles
   * @returns {number}
   */
  function estimateSeconds(imageFiles) {
    const totalMB = imageFiles.reduce((sum, f) => sum + f.size, 0) / (1024 * 1024);
    return Math.max(3, Math.min(20, Math.round(2 + 0.6 * imageFiles.length + 1.5 * totalMB)));
  }

  let _countdownInterval = null;
  let _rafId = null;
  let _processStart = 0;
  let _lastImageCount = 0;

  /**
   * Shows the top progress bar and the in-card processing state card with a
   * live countdown.  Animates the progress bar smoothly over `estimatedSecs`.
   *
   * @param {number} estimatedSecs - Estimated processing duration.
   * @param {number} imageCount    - Number of images being combined.
   */
  function startProcessingUI(estimatedSecs, imageCount) {
    // Top progress bar
    topProgressFill.style.transition = 'none';
    topProgressFill.style.width = '0%';
    // Force reflow: reading offsetWidth flushes pending style changes so the
    // width reset above is committed before the transition is re-enabled.
    // Without this, the browser may batch the reset and the animation together,
    // skipping the 0% → 5% transition entirely.
    void topProgressFill.offsetWidth;
    topProgressFill.style.transition = 'width .4s ease';
    topProgress.classList.add('active');
    // Kick off at 5 % immediately so users see instant feedback.
    topProgressFill.style.width = '5%';

    // Processing state card
    processingLabel.textContent = `Processing ${imageCount} image${imageCount !== 1 ? 's' : ''}…`;
    etaBadge.textContent = `~${estimatedSecs}s`;
    etaBadge.classList.remove('done');
    processingState.classList.add('visible');
    _lastImageCount = imageCount;

    // Countdown timer
    let remaining = estimatedSecs;
    _countdownInterval = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        etaBadge.textContent = 'almost…';
        clearInterval(_countdownInterval);
        _countdownInterval = null;
      } else {
        etaBadge.textContent = `~${remaining}s`;
      }
    }, 1000);

    // Smooth progress bar animation (ease-out, stops at ~85 %)
    _processStart = performance.now();
    const totalMs = estimatedSecs * 1000;

    function animateBar(now) {
      const fraction = Math.min((now - _processStart) / totalMs, 1);
      const eased = 1 - Math.pow(1 - fraction, 2); // ease-out quad
      topProgressFill.style.width = `${5 + eased * 80}%`;
      if (fraction < 1) {
        _rafId = requestAnimationFrame(animateBar);
      }
    }
    _rafId = requestAnimationFrame(animateBar);
  }

  /**
   * Completes and hides the processing UI.
   */
  function stopProcessingUI() {
    clearInterval(_countdownInterval);
    _countdownInterval = null;
    cancelAnimationFrame(_rafId);
    _rafId = null;

    // Flash to 100 % then fade out.
    topProgressFill.style.width = '100%';
    setTimeout(() => {
      topProgress.classList.remove('active');
      setTimeout(() => { topProgressFill.style.width = '0%'; }, 300);
    }, 400);

    processingState.classList.remove('visible');
  }

  // ─── Push notifications ───────────────────────────────────────────────────

  /**
   * Requests browser notification permission if it hasn't been granted yet.
   * Must be called from a user-gesture handler (e.g. button click).
   */
  async function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      await Notification.requestPermission();
    }
  }

  /**
   * Fires a browser push notification indicating the image is ready.
   * Includes the count of combined images so the message is informative.
   */
  function sendNotification() {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const n = _lastImageCount;
    new Notification('Images Combined! ✨', {
      body: `${n} image${n !== 1 ? 's' : ''} merged — ready to download.`,
      icon: '/favicon.ico',
      tag: 'combine-done',
    });
  }

  // ─── Combine & download ───────────────────────────────────────────────────

  combineBtn.addEventListener('click', async () => {
    const validFiles = files.filter(Boolean);
    if (validFiles.length < 2) return;

    // Request notification permission while we have a user gesture.
    await requestNotificationPermission();

    combineBtn.disabled = true;
    statusEl.textContent = '';
    resultSection.style.display = 'none';

    const estimated = estimateSeconds(validFiles);
    startProcessingUI(estimated, validFiles.length);

    const layout = document.getElementById('layout').value;
    const formData = new FormData();
    validFiles.forEach(f => formData.append('images', f));

    try {
      const res = await fetch(`/combine?layout=${layout}`, { method: 'POST', body: formData });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Unknown error' }));
        throw new Error(err.error || res.statusText);
      }

      const blob = await res.blob();

      // Revoke any previous blob URL to free memory before creating a new one.
      if (currentResultUrl) {
        URL.revokeObjectURL(currentResultUrl);
      }
      currentResultUrl = URL.createObjectURL(blob);

      // Show the result image.
      resultImg.src = currentResultUrl;

      // Wire the download button.  Using the blob URL + the HTML `download`
      // attribute triggers a save-file dialog with the provided filename.
      // This works in all modern browsers for same-origin blob URLs.
      downloadBtn.href = currentResultUrl;

      resultSection.style.display = 'block';
      resultSection.scrollIntoView({ behavior: 'smooth' });

      sendNotification();
    } catch (err) {
      statusEl.textContent = `Error: ${err.message}`;
    } finally {
      stopProcessingUI();
      combineBtn.disabled = false;
      updateBtn();
    }
  });
</script>

</body>
</html>
